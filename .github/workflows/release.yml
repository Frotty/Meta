name: Release

# Tag a commit `vX.Y.Z` to cut a release. Meta is consumed via JitPack (which builds the tag/commit on demand),
# so this workflow gates the tag on a green build, publishes a GitHub Release with auto-generated notes, and warms
# the JitPack build so the first consumer doesn't wait.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build & test (release gate)
        run: ./gradlew :runtime:compileKotlin :runtime:test :runtime-desktop:compileKotlin :editor:compileKotlin :editor-desktop:compileKotlin --no-daemon --stacktrace

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"

      - name: Warm JitPack build
        continue-on-error: true
        run: |
          echo "Triggering JitPack build for ${GITHUB_REF_NAME}..."
          curl -sL "https://jitpack.io/com/github/Frotty/Meta/${GITHUB_REF_NAME}/" -o /dev/null || true
